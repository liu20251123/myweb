<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作系统 刷题练习 003</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            padding: 25px 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 820px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 28px 30px 36px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #4a6cf7;
            padding-bottom: 14px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            font-size: 22px;
            color: #1a1a2e;
        }

        .header .info {
            font-size: 14px;
            color: #888;
        }

        .header .info span {
            font-weight: 600;
            color: #4a6cf7;
        }

        .question-card {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 18px 20px 20px;
            margin-bottom: 18px;
            border-left: 4px solid #4a6cf7;
            transition: 0.2s;
        }

        .question-card.correct {
            border-left-color: #22b573;
            background: #f0faf5;
        }

        .question-card.wrong {
            border-left-color: #e74c3c;
            background: #fdf0ef;
        }

        .question-card .q-text {
            font-weight: 500;
            font-size: 15px;
            color: #1a1a2e;
            margin-bottom: 12px;
            line-height: 1.7;
        }

        .question-card .q-text .q-type {
            display: inline-block;
            font-size: 12px;
            background: #e8ecf4;
            color: #555;
            padding: 0 10px;
            border-radius: 12px;
            margin-right: 8px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-left: 4px;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #2d2d3f;
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            border: 1px solid #e2e6ee;
            transition: 0.15s;
        }

        .options label:hover {
            background: #eef2ff;
            border-color: #b3c6ff;
        }

        .options input[type="radio"],
        .options input[type="text"] {
            flex-shrink: 0;
        }

        .options input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #4a6cf7;
            cursor: pointer;
        }

        .options input[type="text"] {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #d0d5e0;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: 0.15s;
            min-width: 100px;
        }

        .options input[type="text"]:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.15);
        }

        .tf-group {
            display: flex;
            gap: 16px;
            padding-left: 4px;
        }

        .tf-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            padding: 6px 18px;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            border: 1px solid #e2e6ee;
            transition: 0.15s;
        }

        .tf-group label:hover {
            background: #eef2ff;
            border-color: #b3c6ff;
        }

        .tf-group input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #4a6cf7;
            cursor: pointer;
        }

        .result-hint {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .result-hint.show {
            display: block;
        }

        .result-hint.correct {
            background: #d4edda;
            color: #0e6b3e;
        }

        .result-hint.wrong {
            background: #f8d7da;
            color: #a11f2e;
        }

        .result-hint .answer-text {
            font-weight: 700;
            color: #c0392b;
        }

        .btn-group {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 11px 32px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #e8ecf4;
            color: #2d2d3f;
        }

        .btn-primary {
            background: #4a6cf7;
            color: white;
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3);
        }
        .btn-primary:hover {
            background: #3a5cd9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #22b573;
            color: white;
        }
        .btn-success:hover {
            background: #1a9a62;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }
        .btn-warning:hover {
            background: #d68910;
        }

        .summary {
            margin-top: 24px;
            padding: 16px 22px;
            background: #f0f2f8;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 15px;
        }

        .summary .score {
            font-weight: 700;
            font-size: 20px;
            color: #1a1a2e;
        }

        .summary .score span {
            color: #4a6cf7;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #bbb;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }

        @media (max-width: 540px) {
            .container {
                padding: 16px 12px;
            }
            .question-card {
                padding: 14px 12px;
            }
            .btn {
                padding: 9px 18px;
                font-size: 13px;
            }
            .header h1 {
                font-size: 18px;
            }
        }
    </style>
</head>

        { type: 'fill', question: '64. 原语是一种特殊的广义指令，又称原子操作，它执行应该是（  ）的。', answer: '不可被中断' },
        { type: 'fill', question: '65. 执行一次信号量S的P操作，使S.value的值减1后，如果S.value的值（  ）时，调用进程阻塞等待。', answer: '小于0' },
        { type: 'fill', question: '66. 每执行一次P操作，信号量S的值减1，如果S≥0，则该进程（  ）。', answer: '继续执行' },

        { type: 'fill', question: '68. （  ）是指并发进程之间存在一种制约关系，一个进程的执行依赖另一个进程的消息，当一个进程没有得到另一个进程的消息时应等待，直到消息到达才被唤醒。', answer: '进程同步' },
        { type: 'fill', question: '69. （  ）是指当若干个并发进程都要使用某一共享资源时，任何时刻最多只允许一个进程去使用，其他要使用该资源的进程必须等待，直到占用资源者释放了该资源。', answer: '进程互斥' },
        { type: 'fill', question: '70. 利用P、V操作管理相关临界区时，必须成对出现，在进入临界区之前要调用（  ）。', answer: 'P操作' },

        // 原53
        { type: 'fill', question: '74. 最基本的通信原语有两条，它们是send原语和（  ）原语。', answer: 'receive' },
        // 原77-87
        { type: 'fill', question: '75. 计算机系统产生死锁的根本原因是（  ）和进程推进顺序不当。', answer: '资源有限' },
        { type: 'fill', question: '76. 两个进程争夺同一个资源时，（  ）（填写"一定"或"不一定"）产生死锁。', answer: '不一定' },
        { type: 'fill', question: '77. 产生死锁的4个必要条件是互斥条件、不可剥夺条件、请求与保持条件和（  ）。', answer: '环路等待' },
        { type: 'fill', question: '78. 解决死锁的方法分为死锁的预防、死锁的避免、死锁的检测和（  ）。', answer: '死锁的解除' },
        { type: 'fill', question: '79. 避免死锁的实质是（  ）。', answer: '保证系统一直处于安全状态' },
        { type: 'fill', question: '80. 只要能保持系统处于安全状态就可（  ）死锁的发生。', answer: '避免' },
        { type: 'fill', question: '81. 当若干进程需求资源的总数大于系统能提供的资源数时，进程间就会出现竞争资源的现象，如果系统对资源（  ）就会引起死锁。', answer: '分配不当' },
        { type: 'fill', question: '82. 如果操作系统能保证所有的进程在有限时间内得到需要的全部资源，并顺利执行完毕，则称系统处于（  ）。', answer: '安全状态' },
        { type: 'fill', question: '83. 操作系统中要兼顾资源的使用效率和安全可靠，对不同的资源采用不同的分配策略，往往采用死锁的预防、避免和（  ）的混合策略。', answer: '检测' },
        { type: 'fill', question: '84. 解除死锁的方法有两种，一种是（  ）一个或几个进程的执行以破坏循环等待，另一种是从涉及死锁的进程中抢夺资源。', answer: '终止' },
        { type: 'fill', question: '85. 如果资源分配图中无环路，则系统中（  ）发生。', answer: '没有死锁' },
    ];

    let userSelections = new Array(questionBank.length).fill(null);
    let resultStatus = new Array(questionBank.length).fill(null);

    const questionListEl = document.getElementById('questionList');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const clearBtn = document.getElementById('clearBtn');
    const correctNumEl = document.getElementById('correctNum');
    const totalNumEl = document.getElementById('totalNum');
    const totalCountSpan = document.getElementById('totalCount');

    function renderQuestions() {
        let html = '';
        for (let i = 0; i < questionBank.length; i++) {
            const q = questionBank[i];
            const status = resultStatus[i];

            let answerDisplay = '';
            if (status === 'correct') {
                answerDisplay = `<div class="result-hint show correct">✅ 正确</div>`;
            } else if (status === 'wrong') {
                let correctStr = '';
                if (q.type === 'choice') {
                    const letters = ['A', 'B', 'C', 'D'];
                    correctStr = letters[q.answer] + '. ' + q.options[q.answer];
                } else if (q.type === 'tf') {
                    correctStr = q.answer ? '✔ 正确 (对)' : '✘ 错误 (错)';
                } else if (q.type === 'fill') {
                    correctStr = q.answer;
                }
                answerDisplay = `<div class="result-hint show wrong">❌ 错误 &nbsp;|&nbsp; 正确答案：<span class="answer-text">${correctStr}</span></div>`;
            }

            let extraClass = '';
            if (status === 'correct') extraClass = 'correct';
            else if (status === 'wrong') extraClass = 'wrong';

            let inputHtml = '';
            if (q.type === 'choice') {
                const letters = ['A', 'B', 'C', 'D'];
                let optsHtml = '';
                for (let j = 0; j < q.options.length; j++) {
                    const checked = (userSelections[i] === j) ? 'checked' : '';
                    optsHtml += `
                                <label>
                                    <input type="radio" name="q${i}" value="${j}" ${checked}>
                                    ${letters[j]}. ${q.options[j]}
                                </label>
                            `;
                }
                inputHtml = `<div class="options">${optsHtml}</div>`;
            } else if (q.type === 'tf') {
                const sel = userSelections[i];
                const checkedTrue = (sel === 0) ? 'checked' : '';
                const checkedFalse = (sel === 1) ? 'checked' : '';
                inputHtml = `
                            <div class="tf-group">
                                <label><input type="radio" name="q${i}" value="0" ${checkedTrue}> ✔ 正确 (对)</label>
                                <label><input type="radio" name="q${i}" value="1" ${checkedFalse}> ✘ 错误 (错)</label>
                            </div>
                        `;
            } else if (q.type === 'fill') {
                const val = userSelections[i] || '';
                inputHtml = `
                            <div class="options">
                                <label style="background:transparent;border:none;padding:0;">
                                    <span style="font-weight:500;color:#555;">填写答案：</span>
                                    <input type="text" class="fill-input" data-index="${i}" value="${val}" placeholder="输入答案...">
                                </label>
                            </div>
                        `;
            }

            const typeLabel = q.type === 'choice' ? '选择' : (q.type === 'tf' ? '判断' : '填空');

            html += `
                        <div class="question-card ${extraClass}" data-index="${i}">
                            <div class="q-text"><span class="q-type">${typeLabel}</span> ${q.question}</div>
                            ${inputHtml}
                            ${answerDisplay}
                        </div>
                    `;
        }

        questionListEl.innerHTML = html;

        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const name = this.name;
                const idx = parseInt(name.substring(1));
                if (this.checked) {
                    userSelections[idx] = parseInt(this.value);
                    if (resultStatus[idx] !== null) {
                        resultStatus[idx] = null;
                        renderQuestions();
                    }
                }
            });
        });

        document.querySelectorAll('.fill-input').forEach(inp => {
            inp.addEventListener('input', function() {
                const idx = parseInt(this.dataset.index);
                userSelections[idx] = this.value.trim();
                if (resultStatus[idx] !== null) {
                    resultStatus[idx] = null;
                    const card = this.closest('.question-card');
                    card.classList.remove('correct', 'wrong');
                    const hint = card.querySelector('.result-hint');
                    if (hint) hint.classList.remove('show');
                    updateSummary();
                }
            });
        });

        totalCountSpan.textContent = questionBank.length;
        totalNumEl.textContent = questionBank.length;
        updateSummary();
    }

    function updateSummary() {
        let correct = 0;
        for (let i = 0; i < resultStatus.length; i++) {
            if (resultStatus[i] === 'correct') correct++;
        }
        correctNumEl.textContent = correct;
    }

   // ================================================================
// 函数1：collectAllAnswers - 从页面收集所有答案
// ================================================================
function collectAllAnswers() {
    // 读取所有选中的 radio
    document.querySelectorAll('input[type="radio"]:checked').forEach(r => {
        const name = r.name;
        if (name && name.startsWith('q')) {
            const idx = parseInt(name.substring(1));
            if (!isNaN(idx)) {
                userSelections[idx] = parseInt(r.value);
            }
        }
    });
    // 读取所有填空输入框
    document.querySelectorAll('.fill-input').forEach(inp => {
        const idx = parseInt(inp.dataset.index);
        if (!isNaN(idx)) {
            userSelections[idx] = inp.value.trim();
        }
    });
}

// ================================================================
// 函数2：handleSubmit - 提交并评分
// ================================================================
function handleSubmit() {
    // 第一步：从页面收集最新答案
    collectAllAnswers();

    // 第二步：检查是否所有题目都已作答
    let allDone = true;
    for (let i = 0; i < questionBank.length; i++) {
        const q = questionBank[i];
        const val = userSelections[i];
        if (q.type === 'fill') {
            if (!val || val.trim() === '') {
                allDone = false;
                break;
            }
        } else {
            if (val === null || val === -1) {
                allDone = false;
                break;
            }
        }
    }
    if (!allDone) {
        alert('⚠️ 还有题目未作答，请完成全部题目后再提交！');
        return;
    }

    // 第三步：逐题评分
for (let i = 0; i < questionBank.length; i++) {
    const q = questionBank[i];
    let userAns = userSelections[i];
    let isCorrect = false;

    if (q.type === 'choice' || q.type === 'tf') {
        // ✅ 统一转成数字再比较
        const userNum = parseInt(userAns);
        let correctNum;
        if (typeof q.answer === 'boolean') {
            correctNum = q.answer ? 0 : 1;   // true→0, false→1
        } else {
            correctNum = parseInt(q.answer);
        }
        isCorrect = (userNum === correctNum);
    } else {
        isCorrect = (userAns.trim() === q.answer);
    }
    resultStatus[i] = isCorrect ? 'correct' : 'wrong';
}

    // 第四步：重新渲染页面，显示结果
    renderQuestions();

    // 第五步：滚动到第一个错题位置
    const firstWrong = document.querySelector('.question-card.wrong');
    if (firstWrong) {
        firstWrong.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 第六步：更新统计
    updateSummary();
}

    function handleReset() {
        userSelections = new Array(questionBank.length).fill(null);
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        resultStatus = new Array(questionBank.length).fill(null);
        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleClear() {
        userSelections = new Array(questionBank.length).fill(null);
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        resultStatus = new Array(questionBank.length).fill(null);
        renderQuestions();
        updateSummary();
    }

    function init() {
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        renderQuestions();
        submitBtn.addEventListener('click', handleSubmit);
        resetBtn.addEventListener('click', handleReset);
        clearBtn.addEventListener('click', handleClear);
    }

    init();
</script>
