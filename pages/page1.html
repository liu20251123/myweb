<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作系统 刷题练习 002</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            padding: 25px 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 820px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 28px 30px 36px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #4a6cf7;
            padding-bottom: 14px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            font-size: 22px;
            color: #1a1a2e;
        }

        .header .info {
            font-size: 14px;
            color: #888;
        }

        .header .info span {
            font-weight: 600;
            color: #4a6cf7;
        }

        .question-card {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 18px 20px 20px;
            margin-bottom: 18px;
            border-left: 4px solid #4a6cf7;
            transition: 0.2s;
        }

        .question-card.correct {
            border-left-color: #22b573;
            background: #f0faf5;
        }

        .question-card.wrong {
            border-left-color: #e74c3c;
            background: #fdf0ef;
        }

        .question-card .q-text {
            font-weight: 500;
            font-size: 15px;
            color: #1a1a2e;
            margin-bottom: 12px;
            line-height: 1.7;
        }

        .question-card .q-text .q-type {
            display: inline-block;
            font-size: 12px;
            background: #e8ecf4;
            color: #555;
            padding: 0 10px;
            border-radius: 12px;
            margin-right: 8px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-left: 4px;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #2d2d3f;
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            border: 1px solid #e2e6ee;
            transition: 0.15s;
        }

        .options label:hover {
            background: #eef2ff;
            border-color: #b3c6ff;
        }

        .options input[type="radio"],
        .options input[type="text"] {
            flex-shrink: 0;
        }

        .options input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #4a6cf7;
            cursor: pointer;
        }

        .options input[type="text"] {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #d0d5e0;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: 0.15s;
            min-width: 100px;
        }

        .options input[type="text"]:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.15);
        }

        .tf-group {
            display: flex;
            gap: 16px;
            padding-left: 4px;
        }

        .tf-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            padding: 6px 18px;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            border: 1px solid #e2e6ee;
            transition: 0.15s;
        }

        .tf-group label:hover {
            background: #eef2ff;
            border-color: #b3c6ff;
        }

        .tf-group input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #4a6cf7;
            cursor: pointer;
        }

        .result-hint {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .result-hint.show {
            display: block;
        }

        .result-hint.correct {
            background: #d4edda;
            color: #0e6b3e;
        }

        .result-hint.wrong {
            background: #f8d7da;
            color: #a11f2e;
        }

        .result-hint .answer-text {
            font-weight: 700;
            color: #c0392b;
        }

        .btn-group {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 11px 32px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #e8ecf4;
            color: #2d2d3f;
        }

        .btn-primary {
            background: #4a6cf7;
            color: white;
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3);
        }
        .btn-primary:hover {
            background: #3a5cd9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #22b573;
            color: white;
        }
        .btn-success:hover {
            background: #1a9a62;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }
        .btn-warning:hover {
            background: #d68910;
        }

        .summary {
            margin-top: 24px;
            padding: 16px 22px;
            background: #f0f2f8;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 15px;
        }

        .summary .score {
            font-weight: 700;
            font-size: 20px;
            color: #1a1a2e;
        }

        .summary .score span {
            color: #4a6cf7;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #bbb;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }

        @media (max-width: 540px) {
            .container {
                padding: 16px 12px;
            }
            .question-card {
                padding: 14px 12px;
            }
            .btn {
                padding: 9px 18px;
                font-size: 13px;
            }
            .header h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 操作系统 002 · 刷题</h1>

</div>

<script>
    // ================================================================
    // 题库：选择题 + 判断题 + 填空题（去掉简答题）
    // 题号从1开始连续编号
    // ================================================================
    const questionBank = [
        // ===== 选择题 (原1-21, 49-67) =====
        { type: 'choice', question: '1. 以下有关进程的描述中，错误的是（  ）。', options: ['进程是动态的概念', '进程执行需要处理器', '进程是有生命周期的', '进程是指令的集合'], answer: 3 },
        { type: 'choice', question: '2. 以下关于进程的描述中，正确的是（  ）。', options: ['进程获得CPU运行是通过调度实现的', '优先级是进程调度的重要依据，一旦确定就不能改变', '在单CPU的系统中，任意时刻都有一个进程处于运行状态', '进程申请CPU得不到满足时，其状态变为阻塞'], answer: 0 },
        { type: 'choice', question: '3. 并发进程指的是（  ）。', options: ['可并行执行的进程', '可同一时刻执行的进程', '在同一时间段内执行的进程', '不可中断的进程'], answer: 2 },
        { type: 'choice', question: '4. 在多道程序设计环境下，操作系统分配资源以（  ）为基本单位。', options: ['程序', '指令', '进程', '作业'], answer: 2 },
        { type: 'choice', question: '5. 操作系统通过（  ）对进程进行管理。', options: ['JCB', 'PCB', 'DCT', 'CHCT'], answer: 1 },
        { type: 'choice', question: '6. 分配到必要的资源并获得处理器时间的进程状态是（  ）。', options: ['就绪状态', '运行状态', '阻塞状态', '撤销状态'], answer: 1 },
        { type: 'choice', question: '7. 当一个进程处于下列哪种状态时（  ），称为阻塞状态。', options: ['它正等着给它输入一批数据', '它正等着进程调度', '它正等着系统分给它一个时间片', '它正等着进入内存'], answer: 0 },
        { type: 'choice', question: '8. 某个运行中的进程要申请打印机，它将变为（  ）。', options: ['就绪态', '阻塞态', '创建态', '撤销态'], answer: 1 },
        { type: 'choice', question: '9. 以下进程状态转变中，（  ）转变是不可能发生的。', options: ['运行→就绪', '运行→阻塞', '阻塞→运行', '阻塞→就绪'], answer: 2 },
        { type: 'choice', question: '10. 当（  ）时，进程从执行状态转变为就绪状态。', options: ['进程被调度程序选中', '分配给它的时间片用完', '等待某一事件', '等待的事件发生'], answer: 1 },
        { type: 'choice', question: '11. 当一个进程用完一个时间片后，系统需要将该进程的状态由运行状态转变为（  ）。', options: ['就绪状态', '阻塞状态', '撤销状态', '创建状态'], answer: 0 },
        { type: 'choice', question: '12. 进程状态由就绪态转变为运行态是由（  ）引起的。', options: ['中断事件', '进程自身', '进程调度', '为程序创建进程'], answer: 2 },
        { type: 'choice', question: '13. 一个进程被唤醒意味着（  ）。', options: ['该进程一定重新占用CPU', '它的优先级变为最大', '其PCB移至就绪队列队首', '进程变为就绪状态'], answer: 3 },
        { type: 'choice', question: '14. 以下可能导致一个进程从运行状态变为就绪状态的事件是（  ）。', options: ['一次I/O操作结束', '运行进程需做I/O操作', '运行进程结束', '出现了比现在进程优先级更高的进程'], answer: 3 },
        { type: 'choice', question: '15. 某进程由于需要从硬盘上读入数据而处于阻塞状态。当系统完成了所需的读盘操作后，此时该进程的状态将（  ）。', options: ['从就绪变为运行', '从运行变为就绪', '从运行变为阻塞', '从阻塞变为就绪'], answer: 3 },
        { type: 'choice', question: '16. 一个进程释放一种资源将有可能导致一个或几个进程（  ）。', options: ['由就绪变为运行', '由运行变为就绪', '由阻塞变为运行', '由阻塞变为就绪'], answer: 3 },
        { type: 'choice', question: '17. 一次I/O操作的结束，有可能导致（  ）。', options: ['一个进程由阻塞变为就绪', '几个进程由就绪变为阻塞', '一个进程由阻塞变为运行', '几个进程由阻塞变为运行'], answer: 0 },
        { type: 'choice', question: '18. 下列情况（  ）必会引起进程切换。', options: ['一个进程创建后，进入就绪态', '一个进程从运行态变为就绪态', '一个进程从阻塞态变为就绪态', '都不对'], answer: 1 },
        { type: 'choice', question: '19. 对进程的管理和控制使用（  ）。', options: ['指令', '原语', '信号量', '信箱'], answer: 1 },
        { type: 'choice', question: '20. 进程被创建后即进入（  ）排队。', options: ['就绪队列', '等待队列', '运行队列', '都不对'], answer: 0 },
        { type: 'choice', question: '21. 以下所述步骤中，（  ）不是创建进程所必须的。', options: ['由调度程序为进程分配CPU', '建立一个进程控制块', '为进程分配内存', '将进程控制块链入就绪队列'], answer: 0 },
        // 原49-67
        { type: 'choice', question: '22. 操作系统中的三级调度是指（  ）。', options: ['处理器调度、资源调度和网络调度', 'CPU调度、设备调度和存储器调度', '作业调度、进程调度和资源调度', '作业调度、进程调度和中级调度'], answer: 3 },
        { type: 'choice', question: '23. 进程调度主要负责（  ）。', options: ['选一个作业进入内存', '选一个进程占有CPU', '建立一个新的进程', '撤销一个进程'], answer: 1 },
        { type: 'choice', question: '24. 作业调度选择一个作业装入主存后，该作业能否占用CPU必须由（  ）来决定。', options: ['设备管理', '作业控制', '驱动调度', '进程调度'], answer: 3 },
        { type: 'choice', question: '25. 当一进程运行时，系统可基于某种原则强行将其撤下，把处理器分配给其他进程，这种调度方式是（  ）。', options: ['非抢占方式', '抢占方式', '中断方式', '查找方式'], answer: 1 },
        { type: 'choice', question: '26. 从进程提交给系统开始到进程完成为止的时间间隔称为（  ）。', options: ['进程周转时间', '进程运行时间', '进程响应时间', '进程等待时间'], answer: 0 },
        { type: 'choice', question: '27. 现有3个同时到达的作业J1、J2和J3，它们的执行时间分别为t1、t2和t3，且t1<t2<t3。系统按单道方式运行且采用短作业优先算法，则平均周转时间是（  ）。', options: ['t1+t2+t3', '（t1+t2+t3）/3', '（3t1+2t2+t3）/3', '（t1+2t2+3t3）/3'], answer: 2 },
        { type: 'choice', question: '28. 一个作业8:00到达系统，估计运行时间为1小时。若从10:00开始执行该作业，其响应比是（  ）。', options: ['2', '1', '3', '0.5'], answer: 2 },
        { type: 'choice', question: '29. 有3个作业J1、J2、J3，其运行时间分别是2、5、3小时，假定它们同时到达，并在同一台处理器上以单道方式运行，则平均周转时间最小的执行序列是（  ）。', options: ['J1、J2、J3', 'J3、J2、J1', 'J2、J1、J3', 'J1、J3、J2'], answer: 3 },
        { type: 'choice', question: '30. 设有4个作业同时到达，每个作业的执行时间均为2小时，它们在单处理器上按单道方式运行，则平均周转时间为（  ）。', options: ['1小时', '5小时', '2.5小时', '8小时'], answer: 1 },
        { type: 'choice', question: '31. 时间片轮转调度算法经常用于（  ）。', options: ['单用户操作系统', '实时系统', '分时系统', '批处理系统'], answer: 2 },
        { type: 'choice', question: '32. 在进程调度算法中，对短进程不利的是（  ）。', options: ['短进程优先调度算法', '先来先服务算法', '高响应比优先算法', '多级反馈队列调度算法'], answer: 1 },
        { type: 'choice', question: '33. 先来先服务调度算法有利于（  ）。', options: ['长作业和CPU繁忙型作业', '长作业和I/O繁忙型作业', '短作业和CPU繁忙型作业', '短作业和I/O繁忙型作业'], answer: 0 },
        { type: 'choice', question: '34. （  ）优先权是在创建进程时确定的，确定之后在整个进程运行期间不再改变。', options: ['先来先服务', '静态', '动态', '短作业'], answer: 1 },
        { type: 'choice', question: '35. 一种既有利于短作业又兼顾到长作业的作业调度算法是（  ）。', options: ['先来先服务', '时间片轮转', '高响应比优先', '短进程优先'], answer: 2 },
        { type: 'choice', question: '36. （  ）调度算法有利于CPU繁忙型的作业，而不利于I/O繁忙型的作业（进程）。', options: ['时间片轮转', '先来先服务', '短作业优先', '优先级'], answer: 1 },

        // ===== 判断题 (原31-41, 74-79) =====

        // ===== 填空题 (原22-30, 68-73) =====
        { type: 'fill', question: '58. 进程与程序的最主要区别在于进程具有（  ），而程序不具备这一特性。', answer: '动态性' },
        { type: 'fill', question: '59. 进程由程序段、数据段和（  ）三部分组成，并且该部分还是进程存在的唯一标志。', answer: 'PCB' },
        { type: 'fill', question: '60. 当系统创建一个进程时，系统就为其分配一个（  ），当进程被撤销时就将其收回。', answer: 'PCB' },
        { type: 'fill', question: '61. 为了实现一个进程由等待状态转换为就绪状态的状态变化，操作系统应提供（  ）原语。', answer: '唤醒' },
        { type: 'fill', question: '62. 正在运行的进程，因某种原因而暂时停止运行，等待某个事件的发生，此时该进程处于（  ）状态。', answer: '阻塞' },
        { type: 'fill', question: '63. 如果一个进程从运行状态变为等待状态，或完成工作后撤销，则必定会发生（  ）。', answer: '进程切换' },
        { type: 'fill', question: '64. 进程有两种基本队列，即等待队列和（  ）。', answer: '就绪队列' },
        { type: 'fill', question: '65. 进程状态变化时，运行态和阻塞态都可能变为（  ）。', answer: '就绪态' },
        { type: 'fill', question: '66. 在一个单处理器系统中，若有5个用户进程，且假设当前时刻为用户态，则处于就绪状态的用户进程最多有（  ）个。', answer: '4' },
        // 原68-73
        { type: 'fill', question: '67. 在操作系统中，（  ）是资源分配、调度和管理的基本单位。', answer: '进程' },
        { type: 'fill', question: '68. 在计算机系统中，只有一个CPU，则多个进程将争夺CPU资源，如何把CPU有效地分配给进程，这是（  ）调度要解决的问题。', answer: '进程' },
        { type: 'fill', question: '69. 当采用优先级进程调度算法时，可以有两种调度算法，一种是抢占式调度，一种是非抢占式调度。若要使当前运行的总是优先级最高的进程，应选择（  ）调度算法。', answer: '抢占式' },
        { type: 'fill', question: '70. 一种最常用的进程调度算法是把处理器分配给具有最高优先权的进程。而优先权可以分为（  ）优先权和动态优先权。', answer: '静态' },
        { type: 'fill', question: '71. 当采用时间片轮转调度算法时，若时间片过大，就会使其转化为（  ）调度算法。', answer: 'FCFS' },
        { type: 'fill', question: '72. 在高响应比调度算法中，当各作业等待时间相同时，（  ）的作业将得到优先调度。', answer: '执行时间短' },
    ];

    let userSelections = new Array(questionBank.length).fill(null);
    let resultStatus = new Array(questionBank.length).fill(null);

    const questionListEl = document.getElementById('questionList');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const clearBtn = document.getElementById('clearBtn');
    const correctNumEl = document.getElementById('correctNum');
    const totalNumEl = document.getElementById('totalNum');
    const totalCountSpan = document.getElementById('totalCount');

    function renderQuestions() {
        let html = '';
        for (let i = 0; i < questionBank.length; i++) {
            const q = questionBank[i];
            const status = resultStatus[i];

            let answerDisplay = '';
            if (status === 'correct') {
                answerDisplay = `<div class="result-hint show correct">✅ 正确</div>`;
            } else if (status === 'wrong') {
                let correctStr = '';
                if (q.type === 'choice') {
                    const letters = ['A', 'B', 'C', 'D'];
                    correctStr = letters[q.answer] + '. ' + q.options[q.answer];
                } else if (q.type === 'tf') {
                    correctStr = q.answer ? '✔ 正确 (对)' : '✘ 错误 (错)';
                } else if (q.type === 'fill') {
                    correctStr = q.answer;
                }
                answerDisplay = `<div class="result-hint show wrong">❌ 错误 &nbsp;|&nbsp; 正确答案：<span class="answer-text">${correctStr}</span></div>`;
            }

            let extraClass = '';
            if (status === 'correct') extraClass = 'correct';
            else if (status === 'wrong') extraClass = 'wrong';

            let inputHtml = '';
            if (q.type === 'choice') {
                const letters = ['A', 'B', 'C', 'D'];
                let optsHtml = '';
                for (let j = 0; j < q.options.length; j++) {
                    const checked = (userSelections[i] === j) ? 'checked' : '';
                    optsHtml += `
                                <label>
                                    <input type="radio" name="q${i}" value="${j}" ${checked}>
                                    ${letters[j]}. ${q.options[j]}
                                </label>
                            `;
                }
                inputHtml = `<div class="options">${optsHtml}</div>`;
            } else if (q.type === 'tf') {
                const sel = userSelections[i];
                const checkedTrue = (sel === 0) ? 'checked' : '';
                const checkedFalse = (sel === 1) ? 'checked' : '';
                inputHtml = `
                            <div class="tf-group">
                                <label><input type="radio" name="q${i}" value="0" ${checkedTrue}> ✔ 正确 (对)</label>
                                <label><input type="radio" name="q${i}" value="1" ${checkedFalse}> ✘ 错误 (错)</label>
                            </div>
                        `;
            } else if (q.type === 'fill') {
                const val = userSelections[i] || '';
                inputHtml = `
                            <div class="options">
                                <label style="background:transparent;border:none;padding:0;">
                                    <span style="font-weight:500;color:#555;">填写答案：</span>
                                    <input type="text" class="fill-input" data-index="${i}" value="${val}" placeholder="输入答案...">
                                </label>
                            </div>
                        `;
            }

            const typeLabel = q.type === 'choice' ? '选择' : (q.type === 'tf' ? '判断' : '填空');

            html += `
                        <div class="question-card ${extraClass}" data-index="${i}">
                            <div class="q-text"><span class="q-type">${typeLabel}</span> ${q.question}</div>
                            ${inputHtml}
                            ${answerDisplay}
                        </div>
                    `;
        }

        questionListEl.innerHTML = html;

        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const name = this.name;
                const idx = parseInt(name.substring(1));
                if (this.checked) {
                    userSelections[idx] = parseInt(this.value);
                    if (resultStatus[idx] !== null) {
                        resultStatus[idx] = null;
                        renderQuestions();
                    }
                }
            });
        });

        document.querySelectorAll('.fill-input').forEach(inp => {
            inp.addEventListener('input', function() {
                const idx = parseInt(this.dataset.index);
                userSelections[idx] = this.value.trim();
                if (resultStatus[idx] !== null) {
                    resultStatus[idx] = null;
                    const card = this.closest('.question-card');
                    card.classList.remove('correct', 'wrong');
                    const hint = card.querySelector('.result-hint');
                    if (hint) hint.classList.remove('show');
                    updateSummary();
                }
            });
        });

        totalCountSpan.textContent = questionBank.length;
        totalNumEl.textContent = questionBank.length;
        updateSummary();
    }

    function updateSummary() {
        let correct = 0;
        for (let i = 0; i < resultStatus.length; i++) {
            if (resultStatus[i] === 'correct') correct++;
        }
        correctNumEl.textContent = correct;
    }

   function collectAllAnswers() {
    // 读取所有选中的 radio
    document.querySelectorAll('input[type="radio"]:checked').forEach(r => {
        const name = r.name;
        if (name && name.startsWith('q')) {
            const idx = parseInt(name.substring(1));
            if (!isNaN(idx)) {
                userSelections[idx] = parseInt(r.value);
            }
        }
    });
    // 读取所有填空输入框
    document.querySelectorAll('.fill-input').forEach(inp => {
        const idx = parseInt(inp.dataset.index);
        if (!isNaN(idx)) {
            userSelections[idx] = inp.value.trim();
        }
    });
}

// ================================================================
// 函数2：handleSubmit - 提交并评分
// ================================================================
function handleSubmit() {
    // 第一步：从页面收集最新答案
    collectAllAnswers();

    // 第二步：检查是否所有题目都已作答
    let allDone = true;
    for (let i = 0; i < questionBank.length; i++) {
        const q = questionBank[i];
        const val = userSelections[i];
        if (q.type === 'fill') {
            if (!val || val.trim() === '') {
                allDone = false;
                break;
            }
        } else {
            if (val === null || val === -1) {
                allDone = false;
                break;
            }
        }
    }
    if (!allDone) {
        alert('⚠️ 还有题目未作答，请完成全部题目后再提交！');
        return;
    }

    // 第三步：逐题评分
for (let i = 0; i < questionBank.length; i++) {
    const q = questionBank[i];
    const userAns = userSelections[i];
    let isCorrect = false;
    if (q.type === 'choice' || q.type === 'tf') {
        isCorrect = (userAns === (q.answer ? 0 : 1));   // ← 只改这一行
    } else {
        isCorrect = (userAns.trim() === q.answer);
    }
    resultStatus[i] = isCorrect ? 'correct' : 'wrong';
}

    // 第四步：重新渲染页面，显示结果
    renderQuestions();

    // 第五步：滚动到第一个错题位置
    const firstWrong = document.querySelector('.question-card.wrong');
    if (firstWrong) {
        firstWrong.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 第六步：更新统计
    updateSummary();
}

    function handleReset() {
        userSelections = new Array(questionBank.length).fill(null);
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        resultStatus = new Array(questionBank.length).fill(null);
        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleClear() {
        userSelections = new Array(questionBank.length).fill(null);
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        resultStatus = new Array(questionBank.length).fill(null);
        renderQuestions();
        updateSummary();
    }

    function init() {
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        renderQuestions();
        submitBtn.addEventListener('click', handleSubmit);
        resetBtn.addEventListener('click', handleReset);
        clearBtn.addEventListener('click', handleClear);
    }

    init();
</script>
