        { type: 'tf', question: '75. 磁盘分配的基本单位是磁盘物理块。', answer: true },

        // ===== 填空题 (原25-36, 71-73, 98-104) =====
        { type: 'fill', question: '76. 文件的结构就是文件的组织形式，从实现观点出发，文件在外存上的存放组织形式称为文件的（  ）。', answer: '物理结构' },

        { type: 'fill', question: '79. 由于文件的性质和用途不同，以及用户对文件使用的要求不同，文件的存取方法有多种，常用的有顺序存取和（  ）。', answer: '随机存取' },
        { type: 'fill', question: '80. 每个索引文件至少有一个索引表，索引表中每个表项应当包括能够标识该记录关键字和该逻辑记录的（  ）。', answer: '物理地址' },
        { type: 'fill', question: '81. 文件的符号名与物理地址之间的转换是通过（  ）来实现的。', answer: '文件目录' },
        { type: 'fill', question: '82. 文件系统为每个文件建立了一个指示逻辑记录和物理块之间的对应关系的表，这个表文件是（  ）。', answer: '索引表' },

        { type: 'fill', question: '85. 在树形目录结构中，（  ）是从根目录出发到达某个文件的通路上所有各级子目录名和该文件名的顺序组合。', answer: '绝对路径名' },
        { type: 'fill', question: '86. （  ）是指避免文件拥有者或其他用户因有意或无意的错误操作使文件受到破坏。', answer: '文件保护' },

        // 原71-73
        { type: 'fill', question: '88. 在某文件系统中，采用FAT方式实现文件。硬盘200MB，盘块大小为1KB，FAT表中每个表项占2个字节，则FAT表占用（  ）KB。', answer: '400' },
        { type: 'fill', question: '89. 一个系统磁盘每块大小为4KB，每块地址用4B表示。采用二级索引文件系统管理的最大的文件是（  ）。', answer: '4GB' },
        { type: 'fill', question: '90. 在文件系统中设置一个（  ）表，它是利用二进制的一位来表示磁盘中一个块的使用情况。', answer: '位示图' },
        // 原98-104
        { type: 'fill', question: '91. 为了确定磁盘上一个物理块所在的位置，必须给出三个参数，分别是（  ）、磁头号和扇区号。', answer: '柱面号' },
        { type: 'fill', question: '92. 执行一次磁头的输入输出时，（  ）是磁头在移动臂带动下到指定柱面所花的时间。', answer: '寻道时间' },
        { type: 'fill', question: '93. 为了减少移动臂所花时间，每个文件信息不是按盘面上的磁道顺序存放满一个盘面后，再放到另一个盘面上，而是按（  ）存放。', answer: '柱面' },
        { type: 'fill', question: '94. 移臂调度的目的是尽可能地减少输入输出操作中的（  ）。', answer: '寻道时间' },
        { type: 'fill', question: '95. 在移臂调度算法中，（  ）算法总是从移动臂当前位置开始沿着臂的移动方向去选择离当前移动臂最近的那个柱面的访问者，若沿臂的移动方向无请求访问时，就改变臂的移动方向再选择。', answer: '电梯调度' },
        { type: 'fill', question: '96. 在移臂调度算法中，（  ）算法总是从等待访问者中选择时间最短的那个请求先执行。', answer: '最短寻道时间优先' },
        { type: 'fill', question: '97. 在移臂调度算法中除了先来先服务算法外，其余三种算法都是根据访问者的（  ）来进行调度的。', answer: '柱面位置' },
    ];

    let userSelections = new Array(questionBank.length).fill(null);
    let resultStatus = new Array(questionBank.length).fill(null);

    const questionListEl = document.getElementById('questionList');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const clearBtn = document.getElementById('clearBtn');
    const correctNumEl = document.getElementById('correctNum');
    const totalNumEl = document.getElementById('totalNum');
    const totalCountSpan = document.getElementById('totalCount');

    function renderQuestions() {
        let html = '';
        for (let i = 0; i < questionBank.length; i++) {
            const q = questionBank[i];
            const status = resultStatus[i];

            let answerDisplay = '';
            if (status === 'correct') {
                answerDisplay = `<div class="result-hint show correct">✅ 正确</div>`;
            } else if (status === 'wrong') {
                let correctStr = '';
                if (q.type === 'choice') {
                    const letters = ['A', 'B', 'C', 'D'];
                    correctStr = letters[q.answer] + '. ' + q.options[q.answer];
                } else if (q.type === 'tf') {
                    correctStr = q.answer ? '✔ 正确 (对)' : '✘ 错误 (错)';
                } else if (q.type === 'fill') {
                    correctStr = q.answer;
                }
                answerDisplay = `<div class="result-hint show wrong">❌ 错误 &nbsp;|&nbsp; 正确答案：<span class="answer-text">${correctStr}</span></div>`;
            }

            let extraClass = '';
            if (status === 'correct') extraClass = 'correct';
            else if (status === 'wrong') extraClass = 'wrong';

            let inputHtml = '';
            if (q.type === 'choice') {
                const letters = ['A', 'B', 'C', 'D'];
                let optsHtml = '';
                for (let j = 0; j < q.options.length; j++) {
                    const checked = (userSelections[i] === j) ? 'checked' : '';
                    optsHtml += `
                                <label>
                                    <input type="radio" name="q${i}" value="${j}" ${checked}>
                                    ${letters[j]}. ${q.options[j]}
                                </label>
                            `;
                }
                inputHtml = `<div class="options">${optsHtml}</div>`;
            } else if (q.type === 'tf') {
                const sel = userSelections[i];
                const checkedTrue = (sel === 0) ? 'checked' : '';
                const checkedFalse = (sel === 1) ? 'checked' : '';
                inputHtml = `
                            <div class="tf-group">
                                <label><input type="radio" name="q${i}" value="0" ${checkedTrue}> ✔ 正确 (对)</label>
                                <label><input type="radio" name="q${i}" value="1" ${checkedFalse}> ✘ 错误 (错)</label>
                            </div>
                        `;
            } else if (q.type === 'fill') {
                const val = userSelections[i] || '';
                inputHtml = `
                            <div class="options">
                                <label style="background:transparent;border:none;padding:0;">
                                    <span style="font-weight:500;color:#555;">填写答案：</span>
                                    <input type="text" class="fill-input" data-index="${i}" value="${val}" placeholder="输入答案...">
                                </label>
                            </div>
                        `;
            }

            const typeLabel = q.type === 'choice' ? '选择' : (q.type === 'tf' ? '判断' : '填空');

            html += `
                        <div class="question-card ${extraClass}" data-index="${i}">
                            <div class="q-text"><span class="q-type">${typeLabel}</span> ${q.question}</div>
                            ${inputHtml}
                            ${answerDisplay}
                        </div>
                    `;
        }

        questionListEl.innerHTML = html;

        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const name = this.name;
                const idx = parseInt(name.substring(1));
                if (this.checked) {
                    userSelections[idx] = parseInt(this.value);
                    if (resultStatus[idx] !== null) {
                        resultStatus[idx] = null;
                        renderQuestions();
                    }
                }
            });
        });

        document.querySelectorAll('.fill-input').forEach(inp => {
            inp.addEventListener('input', function() {
                const idx = parseInt(this.dataset.index);
                userSelections[idx] = this.value.trim();
                if (resultStatus[idx] !== null) {
                    resultStatus[idx] = null;
                    const card = this.closest('.question-card');
                    card.classList.remove('correct', 'wrong');
                    const hint = card.querySelector('.result-hint');
                    if (hint) hint.classList.remove('show');
                    updateSummary();
                }
            });
        });

        totalCountSpan.textContent = questionBank.length;
        totalNumEl.textContent = questionBank.length;
        updateSummary();
    }

    function updateSummary() {
        let correct = 0;
        for (let i = 0; i < resultStatus.length; i++) {
            if (resultStatus[i] === 'correct') correct++;
        }
        correctNumEl.textContent = correct;
    }

    function handleSubmit() {
        let allDone = true;
        for (let i = 0; i < questionBank.length; i++) {
            const q = questionBank[i];
            const val = userSelections[i];
            if (q.type === 'fill') {
                if (!val || val.trim() === '') { allDone = false; break; }
            } else {
                if (val === null || val === -1) { allDone = false; break; }
            }
        }
        if (!allDone) {
            alert('⚠️ 还有题目未作答，请完成全部题目后再提交！');
            return;
        }

        for (let i = 0; i < questionBank.length; i++) {
            const q = questionBank[i];
            const userAns = userSelections[i];
            let isCorrect = false;
            if (q.type === 'choice' || q.type === 'tf') {
                isCorrect = (userAns === q.answer);
            } else {
                isCorrect = (userAns.trim() === q.answer);
            }
            resultStatus[i] = isCorrect ? 'correct' : 'wrong';
        }

        renderQuestions();
        const firstWrong = document.querySelector('.question-card.wrong');
        if (firstWrong) {
            firstWrong.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        updateSummary();
    }

    function handleReset() {
        userSelections = new Array(questionBank.length).fill(null);
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        resultStatus = new Array(questionBank.length).fill(null);
        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleClear() {
        userSelections = new Array(questionBank.length).fill(null);
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        resultStatus = new Array(questionBank.length).fill(null);
        renderQuestions();
        updateSummary();
    }

    function init() {
        for (let i = 0; i < questionBank.length; i++) {
            if (questionBank[i].type === 'fill') userSelections[i] = '';
            else userSelections[i] = null;
        }
        renderQuestions();
        submitBtn.addEventListener('click', handleSubmit);
        resetBtn.addEventListener('click', handleReset);
        clearBtn.addEventListener('click', handleClear);
    }

    init();
</script>
